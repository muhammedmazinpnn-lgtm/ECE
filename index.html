<!DOCTYPE html>
<html>
<head>
  <title>Smart Trolley Scanner</title>

  <!-- Important for mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 10px;
    }

    h2 {
      font-size: 20px;
    }

    #reader {
      width: 100%;
      max-width: 320px;
      margin: auto;
    }

    #result {
      font-size: 18px;
      font-weight: bold;
      color: green;
    }

    button {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h2>Scan Product Barcode</h2>

  <div id="reader"></div>

  <p>Scanned Code:</p>
  <p id="result">None</p>

  <script>
    function onScanSuccess(decodedText) {
      document.getElementById("result").innerText = decodedText;

      // Send to ESP32
      fetch("http://192.168.4.1/scan?code=" + decodedText)
        .then(() => console.log("Sent"))
        .catch(err => console.log(err));
    }

    let scanner = new Html5QrcodeScanner(
      "reader",
      {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      }
    );

    scanner.render(onScanSuccess);
  </script>

</body>
</html>
