<!DOCTYPE html>
<html>
<head>
  <title>Smart Trolley Scanner</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 10px;
    }

    h2 {
      font-size: 20px;
    }

    #reader {
      width: 100%;
      max-width: 320px;
      margin: auto;
    }

    #result {
      font-size: 18px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>

<body>

  <h2>Scan Product Barcode</h2>

  <div id="reader"></div>

  <p>Scanned Code:</p>
  <p id="result">None</p>

  <script>
    function onScanSuccess(decodedText) {
      document.getElementById("result").innerText = decodedText;

      fetch("http://192.168.4.1/scan?code=" + decodedText)
        .catch(err => console.log(err));
    }

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      },
      onScanSuccess
    ).catch(err => console.log(err));
  </script>

</body>
</html>
