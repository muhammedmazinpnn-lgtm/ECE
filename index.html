<!DOCTYPE html>
<html>
<head>
  <title>Smart Trolley Scanner</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 10px;
    }

    h2 {
      font-size: 20px;
    }

    #reader {
      width: 100%;
      max-width: 320px;
      margin: auto;
      display: none;
    }

    #result {
      font-size: 18px;
      font-weight: bold;
      color: green;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 15px;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }
  </style>
</head>

<body>

  <h2>Smart Trolley Scanner</h2>

  <button onclick="startScanner()">Scan</button>

  <div id="reader"></div>

  <p>Scanned Code:</p>
  <p id="result">None</p>

  <script>
    let html5QrCode;

    function onScanSuccess(decodedText) {
      document.getElementById("result").innerText = decodedText;

      fetch("http://192.168.4.1/scan?code=" + decodedText)
        .catch(err => console.log(err));
    }

    function startScanner() {
      document.getElementById("reader").style.display = "block";

      html5QrCode = new Html5Qrcode("reader");

      html5QrCode.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: { width: 250, height: 250 }
        },
        onScanSuccess
      ).catch(err => console.log(err));
    }
  </script>

</body>
</html>
